name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  MODEL_BASE: https://raw.githubusercontent.com/WeChatCV/opencv_3rdparty/a8b69ccc738421293254aec5ddb38bd523503252

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install OpenCV (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-contrib-dev clang libclang-dev pkg-config curl

      - name: Install OpenCV (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install llvm -y
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"
          "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.bat"
          "$GITHUB_WORKSPACE/vcpkg/vcpkg" install opencv4[contrib]:x64-windows
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> "$GITHUB_ENV"

      - name: Download WeChat models
        shell: bash
        run: |
          mkdir -p models
          for file in detect.prototxt detect.caffemodel sr.prototxt sr.caffemodel; do
            curl -fsSL "$MODEL_BASE/$file" -o "models/$file"
          done

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release
