name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    # Linux CI deferred: Ubuntu OpenCV/contrib setup is unreliable on hosted runners.
    # Full webcam build (OpenCV via vcpkg) is local / release packaging only — see scripts/.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (router-only, no OpenCV)
        run: cargo clippy --workspace --no-default-features -- -D warnings

      - name: Test (router-only, no OpenCV)
        run: cargo test --workspace --no-default-features

      - name: Release build (visioflow + visioflow-toast)
        run: cargo build --release --no-default-features -p visioflow-cli --bins
