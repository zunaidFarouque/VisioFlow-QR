[package]
edition = "2021"
name = "nokhwa"
version = "0.10.11"
authors = ["l1npengtul <l1npengtul@protonmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Simple-to-use, cross-platform Rust Webcam Capture Library"
readme = "README.md"
keywords = [
    "camera",
    "webcam",
    "capture",
    "cross-platform",
]
categories = [
    "api-bindings",
    "multimedia",
    "os",
    "web-programming",
]
license = "Apache-2.0"
repository = "https://github.com/l1npengtul/nokhwa"

[package.metadata.docs.rs]
features = [
    "docs-only",
    "docs-nolink",
    "docs-features",
]

[features]
camera-sync-impl = []
decoding = ["nokhwa-core/mjpeg"]
default = ["decoding"]
docs-features = []
docs-nolink = ["nokhwa-core/docs-features"]
docs-only = [
    "input-native",
    "input-opencv",
    "output-wgpu",
    "output-threaded",
    "serialize",
]
input-avfoundation = ["nokhwa-bindings-macos"]
input-msmf = ["nokhwa-bindings-windows"]
input-native = [
    "input-avfoundation",
    "input-v4l",
    "input-msmf",
]
input-opencv = [
    "opencv",
    "opencv/videoio",
    "opencv/rgb",
    "opencv/clang-runtime",
    "nokhwa-core/opencv-mat",
]
input-v4l = ["nokhwa-bindings-linux"]
input-v4l-no-arena-buffer = ["nokhwa-bindings-linux/no-arena-buffer"]
output-threaded = [
    "parking_lot",
    "camera-sync-impl",
]
output-wgpu = [
    "wgpu",
    "nokhwa-core/wgpu-types",
]
serialize = [
    "serde",
    "nokhwa-core/serialize",
]

[lib]
name = "nokhwa"
crate-type = [
    "cdylib",
    "rlib",
]
path = "src/lib.rs"

